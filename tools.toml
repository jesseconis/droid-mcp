# tools.toml — Manifest for droid-mcp
#
# Each [[tool]] declares a binary to expose as an MCP tool.
# At startup, the server runs `binary help_args` to scrape usage docs,
# which become the tool description. The agent reads the real help text
# and constructs the correct flags itself.
#
# Fields:
#   name          MCP tool name (what the agent calls)
#   binary        Binary to invoke
#   help_args     Args to get help text (e.g., ["-h"]). Empty = use fallback_help
#   synopsis      One-line summary shown before help text
#   privilege     "user" (default) or "root"
#   confirm       true = agent should confirm with user first
#   timeout       Seconds before killing (default: 30)
#   subcommand    Fixed subcommand prepended before agent's args
#   fallback_help Manual help text if scraping fails or isn't available

# ── Termux API tools ───────────────────────────────────────────────────
# These wrap Android APIs via the Termux:API addon.
# Help text is scraped automatically from each binary.

[[tool]]
name = "sensor"
binary = "termux-sensor"
help_args = ["-h"]
synopsis = "Read device hardware sensors (accelerometer, gyroscope, light, etc)"

